name: Release

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CONFIGURATION: Release
  RUNTIME: win-x64
  PROJECT: ZgrzytDesktop/ZgrzytDesktop.csproj
  ZIP_NAME: ZgrzytDesktop-win-x64-release.zip
  SETUP_NAME: ZgrzytDesktopSetup.exe

jobs:
  build-release:
    name: Build release package (manual)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/global.json

      - name: Restore
        run: dotnet restore ZgrzytDesktop.sln

      - name: Build
        run: dotnet build ZgrzytDesktop.sln -c ${{ env.CONFIGURATION }} --no-restore

      - name: Test
        run: dotnet test ZgrzytDesktop.sln -c ${{ env.CONFIGURATION }} --no-build --filter "Category!=Integration"

      - name: Restore publish runtime
        run: dotnet restore ${{ env.PROJECT }} -r ${{ env.RUNTIME }}

      - name: Publish (self-contained win-x64)
        run: |
          dotnet publish ${{ env.PROJECT }} `
            -c ${{ env.CONFIGURATION }} `
            -r ${{ env.RUNTIME }} `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:PublishTrimmed=false `
            --no-restore

      - name: Prepare publish folder
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "ZgrzytDesktop/bin/$env:CONFIGURATION/net10.0-windows/$env:RUNTIME/publish"
          $exePath = Join-Path $publishDir "ZgrzytDesktop.exe"
          $readme = Join-Path $env:GITHUB_WORKSPACE "README_RELEASE.txt"

          if (-not (Test-Path $exePath)) {
            throw "Missing publish output: $exePath"
          }

          if (-not (Test-Path $readme)) {
            throw "Missing README_RELEASE.txt in repository root."
          }

          Copy-Item -Path $readme -Destination (Join-Path $publishDir "README_RELEASE.txt") -Force

          # TODO: Authenticode code signing (optional, requires a code-signing certificate).
          # Example after configuring signtool + certificate in the runner or a secure signing service:
          #   $signtool = "${env:ProgramFiles(x86)}\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe"
          #   & $signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /a $exePath

          "PUBLISH_DIR=$publishDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create ZIP and SHA256 checksum
        shell: pwsh
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release"
          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null

          $zipPath = Join-Path $releaseDir $env:ZIP_NAME
          $checksumPath = "$zipPath.sha256"

          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          if (Test-Path $checksumPath) { Remove-Item $checksumPath -Force }

          Compress-Archive -Path (Join-Path $env:PUBLISH_DIR "*") -DestinationPath $zipPath -CompressionLevel Optimal -Force

          $hash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          $fileName = [IO.Path]::GetFileName($zipPath)
          [IO.File]::WriteAllText($checksumPath, ("{0}  {1}" -f $hash, $fileName), [Text.UTF8Encoding]::new($false))

          "ZIP_PATH=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CHECKSUM_PATH=$checksumPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "Inno Setup compiler not found: $iscc"
          }

          $version = dotnet msbuild $env:PROJECT -nologo -getProperty:Version
          if (-not $version) {
            throw "Could not read Version from project."
          }

          $issPath = Join-Path $env:GITHUB_WORKSPACE "installer/ZgrzytDesktop.iss"
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release"

          & $iscc "/DAppVersionDefine=$version" "/DPublishDir=$env:PUBLISH_DIR" "/DOutputDir=$releaseDir" $issPath
          if ($LASTEXITCODE -ne 0) {
            throw "ISCC failed with exit code $LASTEXITCODE"
          }

          $setupPath = Join-Path $releaseDir $env:SETUP_NAME
          if (-not (Test-Path $setupPath)) {
            throw "Missing installer: $setupPath"
          }

          $setupChecksumPath = "$setupPath.sha256"
          $hash = (Get-FileHash -Path $setupPath -Algorithm SHA256).Hash.ToLowerInvariant()
          $fileName = [IO.Path]::GetFileName($setupPath)
          [IO.File]::WriteAllText($setupChecksumPath, ("{0}  {1}" -f $hash, $fileName), [Text.UTF8Encoding]::new($false))

          "SETUP_PATH=$setupPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SETUP_CHECKSUM_PATH=$setupChecksumPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload release ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_PATH }}
          if-no-files-found: error

      - name: Upload SHA256 checksum
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}.sha256
          path: ${{ env.CHECKSUM_PATH }}
          if-no-files-found: error

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SETUP_NAME }}
          path: ${{ env.SETUP_PATH }}
          if-no-files-found: error

      - name: Upload installer SHA256 checksum
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SETUP_NAME }}.sha256
          path: ${{ env.SETUP_CHECKSUM_PATH }}
          if-no-files-found: error
