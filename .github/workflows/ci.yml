name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test (Release)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.203
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/global.json

      - name: Restore
        run: dotnet restore ZgrzytDesktop.sln

      - name: Build
        run: dotnet build ZgrzytDesktop.sln -c Release --no-restore

      - name: Test unit project
        shell: pwsh
        run: |
          dotnet test ZgrzytDesktop.Tests/ZgrzytDesktop.Tests.csproj -c Release --no-build --filter "Category!=Integration" `
            --logger "trx;LogFileName=unit-tests.trx" `
            --results-directory TestResults `
            --collect:"XPlat Code Coverage" `
            -- `
            DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
        continue-on-error: false

      - name: Test headless project
        shell: pwsh
        run: |
          dotnet test ZgrzytDesktop.Headless.Tests/ZgrzytDesktop.Headless.Tests.csproj -c Release --no-build `
            --logger "trx;LogFileName=headless-tests.trx" `
            --results-directory TestResults `
            --collect:"XPlat Code Coverage" `
            -- `
            DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
        continue-on-error: false

      - name: Upload test results (TRX)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults/**/*.trx
          if-no-files-found: warn

      - name: Upload coverage reports (Cobertura XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CoverageReports
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
