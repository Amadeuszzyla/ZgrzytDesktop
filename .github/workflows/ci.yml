name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test (Release)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.203
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/global.json

      - name: Restore
        run: dotnet restore ZgrzytDesktop.sln

      - name: Build
        run: dotnet build ZgrzytDesktop.sln -c Release --no-restore

      - name: Test
        run: dotnet test ZgrzytDesktop.sln -c Release --no-build --filter "Category!=Integration"
